<style>
  :root {

    --primary-light: #FF8C5A;
    --accent: #FFD166;
    --bg: #FFF8F3;
    --bg2: #FFFFFF;
    --bg3: #FFF0E6;
    --text: #1A1A2E;
    --text2: #4A4A6A;
    --text3: #8888AA;
    --border: #F0D8C8;
    --shadow: 0 2px 12px rgba(255,107,53,0.10);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .header { background: linear-gradient(135deg, #FF6B35 0%, #FF4500 60%, #E63900 100%); color: #fff; padding: 28px 24px 20px; text-align: center; position: relative; overflow: hidden; }

  .header h1 { font-size: 28px; font-weight: 800; letter-spacing: 2px; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .header p { font-size: 13px; opacity: 0.85; margin-top: 6px; }
  .header-stats { display: flex; justify-content: center; gap: 24px; margin-top: 14px; }
  .stat-item { text-align: center; }
  .stat-num { font-size: 22px; font-weight: 800; }
  .stat-label { font-size: 11px; opacity: 0.75; }

  /* Tabs */

  .tab { flex: 1; padding: 14px 8px; text-align: center; font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab:hover { color: var(--primary); background: var(--bg3); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--bg3); }

  /* Content */
  .content { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
  .section { display: none; }
  .section.active { display: block; }

  /* Section Title */
  .section-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-title::before { content: ''; display: inline-block; width: 4px; height: 20px; background: var(--primary); border-radius: 2px; }

  /* Filter Bar */

  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .filter-btn:hover, .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .show-card { background: #fff; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
  .show-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(255,107,53,0.18); }
  .show-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: linear-gradient(135deg, #FF6B35, #FF4500); display: flex; align-items: center; justify-content: center; font-size: 40px; }
  .show-poster img { width: 100%; height: 100%; object-fit: cover; }
  .show-poster-placeholder { width: 100%; aspect-ratio: 2/3; display: flex; align-items: center; justify-content: center; font-size: 40px; }
  .show-info { padding: 10px 12px; }
  .show-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .show-meta { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .show-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .tag { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .tag-platform { background: #FFF0E6; color: var(--primary); }
  .tag-year { background: #E8F4FD; color: #2196F3; }
  .tag-score { background: #FFF8E1; color: #F57C00; }
  .show-links { padding: 8px 12px; border-top: 1px solid var(--border); display: flex; gap: 6px; }
  .show-link { font-size: 11px; padding: 3px 8px; border-radius: 6px; text-decoration: none; font-weight: 600; transition: opacity 0.2s; }

  .link-bilibili { background: #E8F0FE; color: #1565C0; }
  .link-tencent { background: #E8F4FD; color: #0066CC; }
  .link-iqiyi { background: #FFF0F0; color: #CC0000; }

  /* Timeline */

  .timeline-item { position: relative; margin-bottom: 12px; }

  .timeline-poster { width: 50px; height: 70px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--bg3); }
  .timeline-poster-placeholder { width: 50px; height: 70px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; }

  .timeline-links { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }

  .performer-avatar { width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: #fff; }
  .performer-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .performer-title { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .performer-shows { font-size: 11px; color: var(--primary); margin-top: 4px; font-weight: 600; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }

  .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; gap: 16px; align-items: center; position: sticky; top: 0; background: #fff; z-index: 1; }
  .modal-avatar { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .modal-name { font-size: 20px; font-weight: 800; }
  .modal-meta { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .modal-close { margin-left: auto; width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--bg3); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .modal-body { padding: 16px 20px; }
  .modal-section-title { font-size: 14px; font-weight: 700; color: var(--text2); margin: 14px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .shows-list { display: flex; gap: 6px; flex-wrap: wrap; }
  .show-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; background: var(--bg3); color: var(--primary); }
  .bits-list { display: flex; flex-direction: column; gap: 8px; }
  .bit-item { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; border-left: 3px solid var(--primary); }
  .bit-title { font-size: 13px; font-weight: 700; color: var(--text); }

  .bit-links { display: flex; gap: 6px; margin-top: 6px; }

  .bit-card { background: #fff; border-radius: var(--radius); padding: 14px; border: 1px solid var(--border); box-shadow: var(--shadow); transition: all 0.2s; }
  .bit-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.12); }

  /* Scrollbar */

  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

</head>

  if (p.bits) {
    p.bits.forEach(b => {
      ALL_BITS.push({ ...b, performer: p.name, performerId: p.id, shows: p.shows });
    });
  }
});

// ============================================================
// 渲染函数
// ============================================================

function posterHTML(show, cls='show-poster') {
  if (show.poster) {
    return `<div class="${cls}"><img src="${show.poster}" alt="${show.name}" referrerpolicy="no-referrer" onerror="this.parentElement.innerHTML='<div style=\\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;background:${show.posterBg}\\'>🎤</div>'" loading="lazy"></div>`;
  }
  return `<div class="${cls}-placeholder" style="background:${show.posterBg}">${show.posterEmoji||'🎤'}</div>`;
}

function renderShows(filter='all') {
  const grid = document.getElementById('shows-grid');
  const filtered = filter === 'all' ? SHOWS : SHOWS.filter(s => s.series.includes(filter));
  grid.innerHTML = filtered.map(show => `
    <div class="show-card">
      ${posterHTML(show)}
      <div class="show-info">
        <div class="show-name">${show.name}</div>
        <div class="show-meta">${show.platform} · ${show.episodes ? show.episodes+'集' : '待播'}</div>
        <div class="show-tags">
          <span class="tag tag-year">${show.year}</span>
          ${show.score ? `<span class="tag tag-score">⭐${show.score}</span>` : '<span class="tag tag-score">待评分</span>'}
          <span class="tag tag-platform">${show.platform}</span>
        </div>
      </div>
      <div class="show-links">
        <a class="show-link link-douban" href="${show.douban}" target="_blank">豆瓣</a>
        ${show.tencent ? `<a class="show-link link-tencent" href="${show.tencent}" target="_blank">腾讯视频</a>` : ''}
        ${show.iqiyi ? `<a class="show-link link-iqiyi" href="${show.iqiyi}" target="_blank">爱奇艺</a>` : ''}
        ${show.bilibili ? `<a class="show-link link-bilibili" href="${show.bilibili}" target="_blank">B站</a>` : ''}
      </div>
    </div>
  `).join('');
}

function renderTimeline(filter='all') {
  const container = document.getElementById('timeline-container');
  const filtered = filter === 'all' ? SHOWS : SHOWS.filter(s => s.series.includes(filter));
  const byYear = {};
  filtered.forEach(s => { if (!byYear[s.year]) byYear[s.year] = []; byYear[s.year].push(s); });
  const years = Object.keys(byYear).sort((a,b) => b-a);
  container.innerHTML = years.map(year => `
    <div class="timeline-year">${year}</div>
    ${byYear[year].map(show => `
      <div class="timeline-item">
        <div class="timeline-card">
          ${show.poster
            ? `<img class="timeline-poster" src="${show.poster}" alt="${show.name}" referrerpolicy="no-referrer" onerror="this.style.display='none'" loading="lazy">`
            : `<div class="timeline-poster-placeholder" style="background:${show.posterBg}">${show.posterEmoji||'🎤'}</div>`
          }
          <div class="timeline-body">
            <div class="timeline-title">${show.name}</div>
            <div class="timeline-desc">${show.desc}</div>
            <div class="timeline-links">
              <a class="show-link link-douban" href="${show.douban}" target="_blank">豆瓣</a>
              ${show.tencent ? `<a class="show-link link-tencent" href="${show.tencent}" target="_blank">腾讯视频</a>` : ''}
              ${show.iqiyi ? `<a class="show-link link-iqiyi" href="${show.iqiyi}" target="_blank">爱奇艺</a>` : ''}
              ${show.bilibili ? `<a class="show-link link-bilibili" href="${show.bilibili}" target="_blank">B站搜索</a>` : ''}
              ${show.score ? `<span class="tag tag-score">⭐${show.score}</span>` : ''}
            </div>
          </div>
        </div>
      </div>
    `).join('')}
  `).join('');
}

function renderPerformers(filter='all', search='') {
  const container = document.getElementById('performers-container');
  let filtered = PERFORMERS;
  if (filter === 'pro') filtered = filtered.filter(p => p.type === 'pro');
  if (filter === 'guest') filtered = filtered.filter(p => p.type === 'guest');
  if (search) filtered = filtered.filter(p => p.name.includes(search) || p.title.includes(search));

  const pros = filtered.filter(p => p.type === 'pro');
  const guests = filtered.filter(p => p.type === 'guest');

  let html = '';
  if (pros.length > 0) {
    html += `<div class="performers-section">
      <div class="performers-label">🎤 专业演员（${pros.length}人）</div>
      <div class="performers-grid">${pros.map(p => performerCardHTML(p)).join('')}</div>
    </div>`;
  }
  if (guests.length > 0) {
    html += `<div class="performers-section">
      <div class="performers-label">⭐ 嘉宾（${guests.length}人）</div>
      <div class="performers-grid">${guests.map(p => performerCardHTML(p)).join('')}</div>
    </div>`;
  }
  container.innerHTML = html || '<div style="text-align:center;color:var(--text3);padding:40px">未找到相关演员</div>';
}

function avatarHTML(p, cls='performer-avatar', size=56) {
  const color = getColor(p.name);
  if (p.avatar) {
    return `<div class="${cls}" style="background:${color};padding:0;overflow:hidden"><img src="${p.avatar}" alt="${p.name}" referrerpolicy="no-referrer" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.parentElement.innerHTML='<span style=\\'font-size:${Math.round(size*0.4)}px\\'>${getInitial(p.name)}</span>';this.parentElement.style.display='flex';this.parentElement.style.alignItems='center';this.parentElement.style.justifyContent='center'" loading="lazy"></div>`;
  }
  return `<div class="${cls}" style="background:${color}">${getInitial(p.name)}</div>`;
}

function performerCardHTML(p) {
  return `<div class="performer-card" onclick="openPerformer('${p.id}')">
    ${avatarHTML(p, 'performer-avatar', 56)}
    <div class="performer-name">${p.name}</div>
    <div class="performer-title">${p.title}</div>
    <div class="performer-shows">${p.shows.length}个节目</div>
  </div>`;
}

function openPerformer(id) {
  const p = PERFORMERS.find(x => x.id === id);
  if (!p) return;
  const color = getColor(p.name);
  const modal = document.getElementById('modal-content');
  modal.innerHTML = `
    <div class="modal-header">
      ${avatarHTML(p, 'modal-avatar', 64)}
      <div>
        <div class="modal-name">${p.name}</div>
        <div class="modal-meta">${p.title}</div>
        <div class="modal-meta" style="margin-top:4px">${p.type === 'pro' ? '🎤 专业演员' : '⭐ 嘉宾'}</div>
      </div>
      <button class="modal-close" onclick="document.getElementById('performer-modal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section-title">参与节目</div>
      <div class="shows-list">${p.shows.map(s => `<span class="show-badge">${s}</span>`).join('')}</div>
      ${p.bits && p.bits.length > 0 ? `
        <div class="modal-section-title">经典段子（${p.bits.length}个）</div>
        <div class="bits-list">${p.bits.map(b => `
          <div class="bit-item">
            <div class="bit-title">${b.title}</div>
            <div class="bit-desc">${b.desc}</div>
            <div class="bit-links">
              <a class="bit-link link-douyin" href="${b.link}" target="_blank">🎵 抖音搜索</a>
            </div>
          </div>
        `).join('')}</div>
      ` : ''}
      <div class="modal-section-title">外部链接</div>
      <div class="bit-links">
        ${p.douyin ? `<a class="bit-link link-douyin" href="${p.douyin}" target="_blank">🎵 抖音</a>` : ''}
        ${p.weibo ? `<a class="bit-link link-weibo" href="${p.weibo}" target="_blank">微博</a>` : ''}
      </div>
    </div>
  `;
  document.getElementById('performer-modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('performer-modal')) {
    document.getElementById('performer-modal').classList.remove('open');
  }
}

function renderBits(filter='all', search='') {
  const grid = document.getElementById('bits-grid');
  let filtered = ALL_BITS;
  if (filter !== 'all') filtered = filtered.filter(b => b.performer === filter);
  if (search) filtered = filtered.filter(b =>
    b.title.includes(search) || b.desc.includes(search) || b.performer.includes(search)
  );
  grid.innerHTML = filtered.map(b => {
    const p = PERFORMERS.find(x => x.name === b.performer);
    const color = p ? getColor(p.name) : '#FF6B35';
    return `<div class="bit-card">
      <div class="bit-card-header">
        <div class="bit-performer-avatar" style="background:${color}">${getInitial(b.performer)}</div>
        <div>
          <div class="bit-performer-name">${b.performer}</div>
          <div class="bit-show-name">${b.shows ? b.shows[0] : ''}</div>
        </div>
      </div>
      <div class="bit-card-title">${b.title}</div>
      <div class="bit-card-desc">${b.desc}</div>
      <div class="bit-card-links">
        <a class="bit-link link-douyin" href="${b.link}" target="_blank">🎵 抖音搜索</a>
      </div>
    </div>`;
  }).join('') || '<div style="text-align:center;color:var(--text3);padding:40px">未找到相关段子</div>';
}

function buildBitsFilter() {
  const bar = document.getElementById('bits-filter');
  const performers = [...new Set(ALL_BITS.map(b => b.performer))];
  bar.innerHTML = `<button class="filter-btn active" onclick="filterBits('all', this)">全部</button>` +
    performers.map(name => `<button class="filter-btn" onclick="filterBits('${name}', this)">${name}</button>`).join('');
}

// ============================================================
// 交互函数
// ============================================================

let currentTab = 'timeline';
let currentShowFilter = 'all';
let currentTimelineFilter = 'all';
let currentPerformerFilter = 'all';
let currentBitsFilter = 'all';

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['timeline','shows','performers','bits'][i] === tab);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  currentTab = tab;
}

function filterShows(filter, btn) {
  document.querySelectorAll('#tab-shows .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentShowFilter = filter;
  renderShows(filter);
}

function filterTimeline(filter, btn) {
  document.querySelectorAll('#timeline-filter .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTimelineFilter = filter;
  renderTimeline(filter);
}

function filterPerformers(filter, btn) {
  document.querySelectorAll('#tab-performers .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPerformerFilter = filter;
  renderPerformers(filter, document.querySelector('#tab-performers .search-box').value);
}

function searchPerformers(val) {
  renderPerformers(currentPerformerFilter, val);
}

function filterBits(filter, btn) {
  document.querySelectorAll('#bits-filter .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentBitsFilter = filter;
  renderBits(filter, document.querySelector('#tab-bits .search-box').value);
}

function searchBits(val) {
  renderBits(currentBitsFilter, val);
}

// ============================================================
// 初始化
// ============================================================

function updateStats() {
  document.getElementById('stat-shows').textContent = SHOWS.length;
  document.getElementById('stat-performers').textContent = PERFORMERS.length;
  document.getElementById('stat-bits').textContent = ALL_BITS.length + '+';
}

(function init() {
  renderTimeline();
  renderShows();
  renderPerformers();
  buildBitsFilter();
  renderBits();
  updateStats();
})();
</script>
